<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexora — License Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }

  h1 { font-size: 1.5rem; font-weight: 700; color: #a78bfa; margin-bottom: 6px; }
  .sub { font-size: .85rem; color: #64748b; margin-bottom: 28px; }

  /* Auth gate */
  #authGate {
    max-width: 420px;
    margin: 80px auto;
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 32px;
  }
  #authGate h2 { color: #a78bfa; margin-bottom: 16px; text-align: center; }

  /* Cards */
  .card {
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 1.1rem; color: #a78bfa; margin-bottom: 16px; }

  /* Form elements */
  label  { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: 4px; margin-top: 12px; }
  input, select {
    width: 100%;
    padding: 10px 12px;
    background: #141620;
    border: 1px solid #2d3148;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: .9rem;
  }
  input:focus, select:focus { outline: 2px solid #7c3aed; border-color: transparent; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px;
    border: none; border-radius: 8px;
    font-size: .9rem; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
    margin-top: 14px;
  }
  .btn:hover { opacity: .85; }
  .btn-primary  { background: #7c3aed; color: #fff; }
  .btn-danger   { background: #dc2626; color: #fff; }
  .btn-warning  { background: #d97706; color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: .78rem; margin-top: 0; }

  /* Result badges */
  #result {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 14px;
    background: #14532d;
    border: 1px solid #22c55e;
    border-radius: 6px;
    font-size: .85rem;
    color: #86efac;
    word-break: break-all;
    display: none;
  }

  /* Table */
  .table-wrap { overflow-x: auto; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th {
    border-bottom: 1px solid #2d3148;
    padding: 8px 10px;
    text-align: left;
    color: #64748b;
    font-weight: 600;
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  td { padding: 10px 10px; border-bottom: 1px solid #1c2035; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #24283a; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: .72rem;
    font-weight: 600;
  }
  .badge-green  { background: #14532d; color: #86efac; }
  .badge-red    { background: #7f1d1d; color: #fca5a5; }
  .badge-yellow { background: #78350f; color: #fcd34d; }

  .mono { font-family: 'Consolas', 'Courier New', monospace; font-size: .8rem; }

  /* Refresh btn */
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1e2130; border: 1px solid #7c3aed;
    color: #e2e8f0; padding: 12px 20px;
    border-radius: 8px; font-size: .85rem;
    opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ADMIN AUTH GATE -->
<div id="authGate">
  <h2>🔐 Admin Login</h2>
  <label>Admin Key</label>
  <input type="password" id="adminKeyInput" placeholder="Enter admin key" />
  <button class="btn btn-primary" onclick="doAuth()" style="width:100%;">Authenticate</button>
  <p id="authError" style="color:#f87171;text-align:center;margin-top:12px;font-size:.85rem;"></p>
</div>

<!-- MAIN PANEL (hidden until authed) -->
<div id="mainPanel" class="hidden">
  <h1>⚡ Vexora License Admin</h1>
  <p class="sub">Manage licenses securely. All actions require admin authentication.</p>

  <!-- Generate -->
  <div class="card">
    <h2>Generate License</h2>
    <label>Duration</label>
    <select id="duration">
      <option value="7">7 Days</option>
      <option value="30" selected>30 Days</option>
      <option value="90">90 Days</option>
      <option value="365">365 Days</option>
      <option value="lifetime">Lifetime</option>
    </select>

    <label>Max Devices</label>
    <input type="number" id="devices" value="1" min="1" max="100">

    <label>Note (optional)</label>
    <input type="text" id="note" placeholder="e.g. Customer name or order ID">

    <button class="btn btn-primary" onclick="createLicense()">Generate License</button>
    <div id="result"></div>
  </div>


  <!-- License List -->
  <div class="card">
    <div class="header-row">
      <h2 style="margin:0">License List</h2>
      <button class="btn btn-primary btn-sm" onclick="loadLicenses()">⟳ Refresh</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>License Key</th>
            <th>Expiry</th>
            <th>Devices</th>
            <th>QR Scans</th>
            <th>Status</th>
            <th>Note</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="list"><tr><td colspan="7" style="color:#64748b;text-align:center">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = "http://127.0.0.1:5000";
let ADMIN_KEY = "";

// ========= AUTH =========
function doAuth() {
  const k = document.getElementById("adminKeyInput").value.trim();
  if (!k) return;
  ADMIN_KEY = k;
  // Test by hitting /admin/list
  fetch(`${API}/admin/list`, { headers: { "X-Admin-Key": ADMIN_KEY } })
    .then(r => {
      if (r.status === 401) throw new Error("Unauthorized");
      return r.json();
    })
    .then(data => {
      document.getElementById("authGate").classList.add("hidden");
      document.getElementById("mainPanel").classList.remove("hidden");
      renderList(data);
    })
    .catch(err => {
      document.getElementById("authError").innerText =
        err.message === "Unauthorized" ? "❌ Invalid admin key" : "❌ Cannot reach server";
    });
}

// Allow Enter key on admin key input
document.getElementById("adminKeyInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doAuth();
});

// ========= ADMIN HEADERS =========
function adminHeaders() {
  return { "Content-Type": "application/json", "X-Admin-Key": ADMIN_KEY };
}

// ========= CREATE =========
async function createLicense() {
  const customScansRaw = document.getElementById("customMaxScans").value;
  const features = {};
  if (customScansRaw !== "") {
      features.max_scans = parseInt(customScansRaw);
  }

  const payload = {
    duration:    document.getElementById("duration").value,
    max_devices: parseInt(document.getElementById("devices").value) || 1,
    note:        document.getElementById("note").value.trim(),
    plan_id:     document.getElementById("plan_id").value || null,
    features:    features
  };
  try {
    const res  = await fetch(`${API}/admin/create`, {
      method: "POST",
      headers: adminHeaders(),
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (res.ok) {
      const box = document.getElementById("result");
      box.style.display = "block";
      box.innerHTML = `
        <b>✅ License Created</b><br>
        <span class="mono">${data.license}</span><br>
        Expiry: ${data.expiry} &nbsp;|&nbsp; Max Devices: ${data.max_devices}
      `;
      showToast("License created!");
      loadLicenses();
    } else {
      showToast("Error: " + (data.error || "Unknown"), true);
    }
  } catch {
    showToast("Server error", true);
  }
}

// ========= LIST =========
async function loadLicenses() {
  try {
    const res  = await fetch(`${API}/admin/list`, { headers: { "X-Admin-Key": ADMIN_KEY } });
    const data = await res.json();
    renderList(data);
  } catch {
    document.getElementById("list").innerHTML =
      '<tr><td colspan="6" style="color:#f87171;text-align:center">Failed to load</td></tr>';
  }
}

function renderList(data) {
  const tbody = document.getElementById("list");
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:#64748b;text-align:center">No licenses yet</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(l => {
    const expiry = l.expiry === "lifetime"
      ? '<span class="badge badge-green">Lifetime</span>'
      : (() => {
          const d = new Date(l.expiry);
          const expired = d < new Date();
          return `<span class="badge ${expired ? 'badge-red' : 'badge-yellow'}">${d.toLocaleDateString()}</span>`;
        })();

    const status = l.is_active
      ? '<span class="badge badge-green">Active</span>'
      : '<span class="badge badge-red">Revoked</span>';

    const key = `<span class="mono">${l.license.substring(0,8)}…</span>
      <button class="btn btn-sm" style="background:#2d3148;color:#a78bfa;margin-left:6px"
        onclick="copyKey('${l.license}')">Copy</button>`;

    const actions = l.is_active
      ? `<button class="btn btn-danger btn-sm" onclick="revoke('${l.license}')">Revoke</button>
         <button class="btn btn-warning btn-sm" style="margin-left:6px" onclick="resetDevices('${l.license}')">Reset Devices</button>`
      : `<span style="color:#4b5563;font-size:.75rem">Revoked</span>`;

    const scanCount = l.qr_scan_count || 0;
    const scanBadge = scanCount > 0
      ? `<span class="badge badge-yellow">${scanCount}</span>`
      : `<span style="color:#4b5563">0</span>`;

    return `
      <tr>
        <td>${key}</td>
        <td>${expiry}</td>
        <td>${l.active_devices} / ${l.max_devices}</td>
        <td>${scanBadge}</td>
        <td>${status}</td>
        <td style="color:#94a3b8">${l.note || '—'}</td>
        <td>${actions}</td>
      </tr>`;
  }).join("");
}

// ========= REVOKE =========
async function revoke(licenseKey) {
  if (!confirm(`Revoke license ${licenseKey.substring(0,8)}…?`)) return;
  try {
    const res = await fetch(`${API}/admin/revoke`, {
      method: "POST",
      headers: adminHeaders(),
      body: JSON.stringify({ license_key: licenseKey })
    });
    const data = await res.json();
    if (res.ok && data.success) { showToast("License revoked"); loadLicenses(); }
    else showToast("Error: " + (data.error || "Unknown"), true);
  } catch { showToast("Server error", true); }
}

// ========= RESET DEVICES =========
async function resetDevices(licenseKey) {
  if (!confirm(`Reset all devices for ${licenseKey.substring(0,8)}…?`)) return;
  try {
    const res = await fetch(`${API}/admin/reset-device`, {
      method: "POST",
      headers: adminHeaders(),
      body: JSON.stringify({ license_key: licenseKey })
    });
    const data = await res.json();
    if (res.ok && data.success) { showToast("Devices reset"); loadLicenses(); }
    else showToast("Error: " + (data.error || "Unknown"), true);
  } catch { showToast("Server error", true); }
}

// ========= PLANS (kept for compatibility, just hidden) =========
async function loadPlans() {
  // Plans UI removed, but we still load so existing plan_id logic doesn't break
  try {
    const res = await fetch(`${API}/admin/plans`, { headers: adminHeaders() });
    const data = await res.json();
    // No-op: plans panel removed from UI
  } catch (e) {
    // Ignore – plans might not be set up
  }
}

// ========= UTILS =========
function copyKey(key) {
  navigator.clipboard.writeText(key).then(() => showToast("Copied!"));
}

function showToast(msg, isError = false) {
  const t  = document.getElementById("toast");
  t.innerText = msg;
  t.style.borderColor = isError ? "#dc2626" : "#7c3aed";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
